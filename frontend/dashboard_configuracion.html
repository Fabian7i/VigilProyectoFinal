<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración de Perfil - Colegio Enrique Paillardelle</title>
  <!-- Enlaces de estilos corporativos -->
  <link rel="stylesheet" href="css/paginaweb.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/configuracion_dashboard.css">
  <link rel="icon" type="image/png" href="img/logo_enriquepaillardelle.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <div class="wrapper-dashboard">
    <!-- BARRA LATERAL (SIDEBAR) -->
    <aside class="sidebar-dash">
      <div class="sidebar-brand-dash">
        <img src="img/logo_enriquepaillardelle.png" alt="Logo Colegio Enrique Paillardelle">
      </div>
      <ul class="sidebar-menu-dash">
        <li><a href="dashboard.html">Menu</a></li>
        <li><a href="noticias_dashboard.html">Noticias</a></li>
        <li><a href="actividades_dashboard.html">Actividades</a></li>
        <li><a href="comunicados_dashboard.html">Comunicados</a></li>
        <li><a href="usuarios_dashboard.html">Usuarios</a></li>
        <li><a href="#" class="active">Configuracion</a></li>
      </ul>
    </aside>

    <!-- ÁREA DE CONTENIDO PRINCIPAL -->
    <div class="main-content-dash">
      <!-- CABECERA -->
      <header class="header-dash">
        <h1 class="m-0">INSTITUCION EDUCATIVA ENRIQUE PAILLARDELLE - DASHBOARD ADMINISTRATIVO</h1>
        <div class="user-profile-dash">
          <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=150" alt="Admin" class="avatar-dash">
          <span class="menu-burger-icon">☰</span>
        </div>
      </header>

      <!-- SECCIÓN DEL MÓDULO DE CONFIGURACIÓN -->
      <main class="dashboard-container-dash">
        
        <!-- TARJETA PRINCIPAL DE CONFIGURACIÓN -->
        <div class="modulo-configuracion-card">
          <div class="row">
            
            <!-- COLUMNA IZQUIERDA: FORMULARIO -->
            <div class="col-lg-7 col-md-12">
              <h2 class="modulo-titulo-principal mb-4">PERFIL DE USUARIO</h2>
              
              <form action="#" method="POST" class="form-configuracion-wrapper">
                <div class="mb-3">
                  <label class="form-label-dash">NOMBRE DE USUARIO</label>
                  <input type="text" class="form-control form-input-dash" value="María López">
                </div>
                
                <div class="mb-3">
                  <label class="form-label-dash">CORREO ELECTRONICO</label>
                  <input type="email" class="form-control form-input-dash" value="contacto@paillardelle.edu.pe">
                </div>
                
                <div class="mb-3">
                  <label class="form-label-dash">CONTRASEÑA</label>
                  <input type="password" class="form-control form-input-dash" value="************">
                </div>
                
                <div class="mb-3">
                  <label class="form-label-dash">FECHA DE NACIMIENTO</label>
                  <input type="text" class="form-control form-input-dash" value="12/06/1990">
                </div>
                
                <div class="mb-4">
                  <label class="form-label-dash">CARGO</label>
                  <input type="text" class="form-control form-input-dash" value="Administrador" readonly>
                </div>

                <!-- Botón Guardar Datos alineado abajo -->
                <div class="container-btn-guardar text-center text-lg-end">
                  <button type="submit" class="btn-guardar-datos">
                    <span class="btn-guardar-icon">
                      <i class="bi bi-download"></i>
                    </span>
                    <span class="btn-guardar-text">GUARDAR DATOS</span>
                  </button>
                </div>
              </form>
            </div>

            <!-- COLUMNA DERECHA: FOTO DE PERFIL -->
            <div class="col-lg-5 col-md-12 text-center d-flex flex-column align-items-center justify-content-start mt-4 mt-lg-0">
              <h3 class="subtitulo-foto-dash mb-4">FOTO DE USUARIO</h3>
              
              <!-- Contenedor de la Imagen Circular -->
              <div class="avatar-perfil-container mb-3">
                <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=350" alt="Foto de Perfil de Usuario" class="img-avatar-perfil">
              </div>

              <!-- Botón Cambiar Foto -->
              <button type="button" class="btn-cambiar-foto">
                CAMBIAR FOTO DE<br>USUARIO
              </button>
            </div>

          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
