<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo - Colegio Enrique Paillardelle</title>
  <script src="AuthGuard.js"></script>
  <link rel="stylesheet" href="css/paginaweb.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/contacto_formulario_dashboard.css">
  <link rel="icon" type="image/png" href="img/logo_enriquepaillardelle.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Agregamos FontAwesome para los íconos de la interfaz -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <div class="wrapper-dashboard">
    <aside class="sidebar-dash">
      <div class="sidebar-brand-dash">
        <img src="img/logo_enriquepaillardelle.png" alt="Logo Colegio Enrique Paillardelle">
      </div>
      <ul class="sidebar-menu-dash">
        <li><a href="dashboard.html">Panel Principal</a></li>
        <li><a href="noticias_dashboard.html">Noticias</a></li>
        <li><a href="galeria_dashboard.html">Galería</a></li>
        <li><a href="#" class="active">Formulario de Contacto</a></li>
        <li><a href="comunicados_dashboard.html">Comunicados</a></li>
        <li><a href="comentarios_dashboard.html">Comentarios</a></li>
        <li><a href="usuarios_dashboard.html">Usuarios</a></li>
        <li><a href="dashboard_configuracion.html">Configuración</a></li>
      </ul>
    </aside>

    <div class="main-content-dash">
      <header class="header-dash">
        <h1 class="m-0">I.E. ENRIQUE PAILLARDELLE - PANEL DE ADMINISTRACIÓN</h1>
        <div class="user-profile-dash menu-usuario-wrapper">

          <button type="button" class="btn-menu-usuario" id="btnMenuUsuario" aria-label="Abrir menú">

            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=150"
              alt="Foto del administrador" class="avatar-dash avatar-dashboard-global">

            <span class="menu-burger-icon">
              <i class="bi bi-list"></i>
            </span>

          </button>

          <div class="menu-desplegable-usuario" id="menuUsuario">

            <a href="perfil_dashboard.html" class="menu-usuario-item">
              <i class="bi bi-person-circle"></i>
              Perfil
            </a>

            <a href="dashboard_configuracion.html" class="menu-usuario-item">
              <i class="bi bi-gear"></i>
              Configuración
            </a>

            <button type="button" class="menu-usuario-item salir" id="btnSalirGlobal">

              <i class="bi bi-box-arrow-right"></i>
              Salir

            </button>

          </div>

        </div>
      </header>

      <!-- SECCIÓN DEL CONTENEDOR FLEXIBLE PARA INTEGRAR EL PANEL LATERAL -->
      <main class="dashboard-container-dash posicion-relativa-modulo">

        <div class="modulo-contenido-principal">
          <!-- Encabezado del Módulo -->
          <div class="titulo-seccion-dash mb-4">
            <h2>MÓDULO DE CONTACTO</h2>
            <div class="linea-decorativa-amarilla-izquierda"></div>
          </div>

          <!-- Tarjetas de Resumen -->
          <div class="metrics-grid-dash mb-4">
            <div class="card-dash c-blue-navy text-center">
              <div class="card-title-dash"><i class="fa-solid fa-envelope me-2"></i> Total de mensajes</div>
              <div class="card-value-dash" id="txt-total-mensajes">0</div>
            </div>
            <div class="card-dash c-gold text-center">
              <div class="card-title-dash">🟡 Pendientes</div>
              <div class="card-value-dash" id="txt-pendientes-mensajes">0</div>
            </div>
            <div class="card-dash c-blue-light text-center">
              <div class="card-title-dash">🟢 Respondidos</div>
              <div class="card-value-dash" id="txt-respondidos-mensajes">0</div>
            </div>
          </div>

          <!-- Barra de Herramientas -->
          <div class="barra-herramientas-contacto mb-4">
            <div class="buscador-modulo">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="input-buscar" placeholder="Buscar por nombre, correo o asunto...">
            </div>
          </div>

          <!-- Lista de Mensajes -->
          <div class="contenedor-lista-mensajes" id="lista-mensajes-dinamica">
            <!-- Los elementos se inyectarán de forma dinámica mediante JavaScript -->
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="script.js/contactoDA.js"></script>
  <script src="script.js/dashboard/Menu_usuario.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
