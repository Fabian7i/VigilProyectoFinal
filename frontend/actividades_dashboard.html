<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo de Actividades - Colegio Enrique Paillardelle</title>
  <link rel="stylesheet" href="css/paginaweb.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/actividades_dashboard.css">
  <link rel="icon" type="image/png" href="img/logo_enriquepaillardelle.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <div class="wrapper-dashboard">
    <aside class="sidebar-dash">
      <div class="sidebar-brand-dash">
        <img src="img/logo_enriquepaillardelle.png" alt="Logo Colegio Enrique Paillardelle">
      </div>
      <ul class="sidebar-menu-dash">
        <li><a href="dashboard.html">Panel Principal</a></li>
        <li><a href="noticias_dashboard.html">Noticias</a></li>
        <li><a href="#" class="active">Actividades</a></li>
        <li><a href="comunicados_dashboard.html">Comunicados</a></li>
        <li><a href="usuarios_dashboard.html">Usuarios</a></li>
        <li><a href="dashboard_configuracion.html">Configuración</a></li>
      </ul>
    </aside>

    <div class="main-content-dash">
      <header class="header-dash">
        <h1 class="m-0">I.E. ENRIQUE PAILLARDELLE - PANEL DE ADMINISTRACIÓN</h1>
        <div class="user-profile-dash">
          <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=150" alt="Admin" class="avatar-dash">
          <span class="menu-burger-icon">☰</span>
        </div>
      </header>

      <main class="dashboard-container-dash">
        <div class="modulo-actividades-card">
          
          <div class="titulo-seccion-dash mb-4">
            <h2>MÓDULO DE ACTIVIDADES</h2>
            <div class="linea-decorativa-amarilla-izquierda"></div>
          </div>

          <div class="actividades-galeria-container mb-5">
            <div class="actividades-fotos-wrapper">
              <div class="foto-item">
                <img src="img/actividad1.png" alt="Actividad 1" onerror="this.src='https://via.placeholder.com/180x100?text=Actividad+1'">
              </div>
              <div class="foto-item">
                <img src="img/actividad2.png" alt="Actividad 2" onerror="this.src='https://via.placeholder.com/180x100?text=Actividad+2'">
              </div>
              <div class="foto-item">
                <img src="img/actividad3.png" alt="Actividad 3" onerror="this.src='https://via.placeholder.com/180x100?text=Actividad+3'">
              </div>
            </div>
            
            <button class="btn-siguiente-actividad" type="button">
              <span class="flecha-icono">
                <i class="bi bi-arrow-right"></i>
              </span>
              <span class="texto-btn">SIGUIENTE ACTIVIDAD</span>
            </button>
          </div>

          <div class="form-actividad-container">
            <div class="titulo-seccion-dash mb-4">
              <h3 class="subtitulo-actividades-dash">PUBLICAR NUEVA ACTIVIDAD</h3>
              <div class="linea-decorativa-amarilla-izquierda short"></div>
            </div>

            <form action="#" method="POST" class="row">
              
              <div class="col-12 mb-4">
                <label class="uploader-actividad-box">
                  <input type="file" accept="image/*" class="d-none">
                  <div class="uploader-content text-center">
                    <span class="bi bi-image-fill uploader-icon"></span>
                    <p class="m-0 mt-2">Subir nueva imagen</p>
                  </div>
                </label>
              </div>

              <div class="col-md-9">
                <div class="mb-4">
                  <label class="form-label-dash">TITULO DE LA ACTIVIDAD</label>
                  <input type="text" class="form-control form-input-dash" placeholder="Escribe el título de la actividad aquí...">
                </div>
              </div>

              <div class="col-md-3 d-flex align-items-end justify-content-center pb-4">
                <button type="submit" class="btn-guardar-actividad">
                  <span class="btn-guardar-icon">
                    <i class="bi bi-download"></i>
                  </span>
                  <span class="btn-guardar-text">GUARDAR ACTIVIDAD</span>
                </button>
              </div>

            </form>
          </div>

        </div>
      </main>
    </div>
  </div>


  <script src="script.js/codigo.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
