<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Perfil de Usuario - Colegio Enrique Paillardelle</title>

  <link rel="stylesheet" href="css/paginaweb.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/perfil_dashboard.css">

  <link rel="icon" type="image/png" href="img/logo_enriquepaillardelle.png">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >
</head>

<body>

  <div class="wrapper-dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar-dash">

      <div class="sidebar-brand-dash">
        <img
          src="img/logo_enriquepaillardelle.png"
          alt="Logo Colegio Enrique Paillardelle"
        >
      </div>

      <ul class="sidebar-menu-dash">
        <li>
          <a href="dashboard.html">Panel Principal</a>
        </li>

        <li>
          <a href="noticias_dashboard.html">Noticias</a>
        </li>

        <li>
          <a href="contacto_formulario_dashboard.html">
            Formulario de contacto
          </a>
        </li>

        <li>
          <a href="comunicados_dashboard.html">Comunicados</a>
        </li>

        <li>
          <a href="comentarios_dashboard.html">Comentarios</a>
        </li>

        <li>
          <a href="usuarios_dashboard.html">Usuarios</a>
        </li>

        <li>
          <a href="perfil_dashboard.html" class="active">Mi Perfil</a>
        </li>

        <li>
          <a href="dashboard_configuracion.html">Configuración</a>
        </li>
      </ul>

    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content-dash">

      <!-- HEADER -->
      <header class="header-dash">

        <h1 class="m-0">
          I.E. ENRIQUE PAILLARDELLE - PANEL DE ADMINISTRACIÓN
        </h1>

        <div class="user-profile-dash">
          <img
            src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=150"
            alt="Foto del administrador"
            class="avatar-dash"
          >

          <span class="menu-burger-icon">☰</span>
        </div>

      </header>

      <!-- PERFIL -->
      <main class="dashboard-container-dash">

        <section class="perfil-dashboard-card">

          <div class="titulo-seccion-dash mb-4">
            <h2>PERFIL DE USUARIO</h2>
            <div class="linea-decorativa-amarilla-izquierda"></div>
          </div>

          <div class="perfil-grid">

            <!-- COLUMNA IZQUIERDA -->
            <div class="perfil-formulario">

              <div class="grupo-campo-perfil">
                <label for="nombre">Nombre de usuario</label>

                <input
                  type="text"
                  id="nombre"
                  value="María López"
                  placeholder="Ingresa tu nombre"
                >
              </div>

              <div class="grupo-campo-perfil">
                <label for="correo">Correo electrónico</label>

                <input
                  type="email"
                  id="correo"
                  value="contacto@paillardelle.edu.pe"
                  placeholder="Ingresa tu correo"
                >
              </div>

              <div class="grupo-campo-perfil">
                <label for="contrasena">Contraseña</label>

                <div class="campo-con-icono">
                  <input
                    type="password"
                    id="contrasena"
                    value="123456789012"
                    placeholder="Ingresa tu contraseña"
                  >

                  <button
                    type="button"
                    class="btn-ver-password"
                    aria-label="Mostrar contraseña"
                  >
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>

              <div class="grupo-campo-perfil">
                <label for="fecha">Fecha de nacimiento</label>

                <input
                  type="date"
                  id="fecha"
                  value="1990-06-12"
                >
              </div>

              <div class="grupo-campo-perfil">
                <label for="cargo">Cargo</label>

                <input
                  type="text"
                  id="cargo"
                  value="Administrador"
                  placeholder="Cargo del usuario"
                >
              </div>

              <div class="contenedor-boton-guardar">
                <button type="button" class="btn-guardar-perfil">
                  <span class="icono-guardar-perfil">
                    <i class="bi bi-save2-fill"></i>
                  </span>

                  <span>Guardar datos</span>
                </button>
              </div>

            </div>

            <!-- COLUMNA DERECHA -->
            <div class="perfil-fotografia">

              <h3>FOTO DE USUARIO</h3>

              <div class="contenedor-foto-perfil">

                <img
                  id="preview-foto"
                  src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400"
                  alt="Foto de usuario"
                >

                <span class="estado-foto-perfil">
                  <i class="bi bi-check-circle-fill"></i>
                </span>

              </div>

              <label class="btn-cambiar-foto" for="input-foto">
                <i class="bi bi-camera-fill"></i>
                Cambiar foto de usuario
              </label>

              <input
                type="file"
                id="input-foto"
                accept="image/*"
                hidden
              >

              <p class="texto-ayuda-foto">
                Formatos permitidos: JPG, PNG o WEBP.
              </p>

            </div>

          </div>

        </section>

      </main>

    </div>

  </div>

  <script>
    const inputFoto = document.getElementById('input-foto');
    const previewFoto = document.getElementById('preview-foto');

    inputFoto.addEventListener('change', function () {
      const archivo = this.files[0];

      if (!archivo) {
        return;
      }

      const lector = new FileReader();

      lector.onload = function (evento) {
        previewFoto.src = evento.target.result;
      };

      lector.readAsDataURL(archivo);
    });

    const botonPassword = document.querySelector('.btn-ver-password');
    const inputPassword = document.getElementById('contrasena');

    botonPassword.addEventListener('click', function () {
      const esPassword = inputPassword.type === 'password';

      inputPassword.type = esPassword ? 'text' : 'password';

      this.innerHTML = esPassword
        ? '<i class="bi bi-eye-slash"></i>'
        : '<i class="bi bi-eye"></i>';
    });
  </script>
  
  <script src="script.js/dashboard/Menu_usuario.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

</body>
</html>
