<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo de Noticias - Colegio Enrique Paillardelle</title>
  <link rel="stylesheet" href="css/paginaweb.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/noticias_dashboard.css">
  <link rel="icon" type="image/png" href="img/logo_enriquepaillardelle.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <div class="wrapper-dashboard">
    <aside class="sidebar-dash">
      <div class="sidebar-brand-dash">
        <img src="img/logo_enriquepaillardelle.png" alt="Logo Colegio Enrique Paillardelle">
      </div>
      <ul class="sidebar-menu-dash">
        <li><a href="dashboard.html">Panel Principal</a></li>
        <li><a href="#" class="active">Noticias</a></li>
        <li><a href="actividades_dashboard.html">Actividades</a></li>
        <li><a href="comunicados_dashboard.html">Comunicados</a></li>
        <li><a href="usuarios_dashboard.html">Usuarios</a></li>
        <li><a href="#">Configuración</a></li>
      </ul>
    </aside>

    <div class="main-content-dash">
      <header class="header-dash">
        <h1 class="m-0">I.E. ENRIQUE PAILLARDELLE - PANEL DE ADMINISTRACIÓN</h1>
        <div class="user-profile-dash">
          <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=150" alt="Admin" class="avatar-dash">
          <span class="menu-burger-icon">☰</span>
        </div>
      </header>

      <main class="dashboard-container-dash">
        <div class="modulo-noticias-card">
          
          <div class="titulo-seccion-dash mb-4">
            <h2>MÓDULO DE NOTICIAS</h2>
            <div class="linea-decorativa-amarilla-izquierda"></div>
          </div>

          <div class="noticias-galeria-container mb-5">
            <!-- SE AJUSTÓ AQUÍ: Agregamos el ID para que JavaScript limpie e itere aquí mismo en caliente -->
            <div class="noticias-fotos-wrapper" id="contenedor-fotos-noticias">
              <div class="foto-item">
                <img src="img/imagen_carrusel1.png" alt="Noticia 1" onerror="this.src='https://via.placeholder.com/180x100?text=Foto+1'">
              </div>
              <div class="foto-item">
                <img src="img/imagen_carrusel2.png" alt="Noticia 2" onerror="this.src='https://via.placeholder.com/180x100?text=Foto+2'">
              </div>
              <div class="foto-item">
                <img src="img/imagen_carrusel3.png" alt="Noticia 3" onerror="this.src='https://via.placeholder.com/180x100?text=Foto+3'">
              </div>
              <div class="foto-item">
                <img src="img/historia_foto.jpg" alt="Noticia 4" onerror="this.src='https://via.placeholder.com/180x100?text=Foto+4'">
              </div>
            </div>
            
            <button class="btn-siguiente-noticia" type="button">
              <span class="flecha-icono">
                <i class="bi bi-arrow-right"></i>
              </span>
              <span class="texto-btn">SIGUIENTE NOTICIA</span>
            </button>
          </div>

          <div class="form-noticia-container">
            <div class="titulo-seccion-dash mb-4">
              <h3 class="subtitulo-noticias-dash">PUBLICAR NUEVA NOTICIA</h3>
              <div class="linea-decorativa-amarilla-izquierda short"></div>
            </div>
            
            <!-- SE AJUSTÓ AQUÍ: Quitamos el action e incorporamos un ID único para el script -->
            <form id="form-noticias-dashboard" class="row">
              
              <div class="col-12 mb-4">
                <label class="uploader-noticia-box">
                  <!-- SE AJUSTÓ AQUÍ: Se añadió name e id para el archivo de imagen -->
                  <input type="file" id="input-imagen" name="imagen" accept="image/*" class="d-none">
                  <div class="uploader-content text-center">
                    <span class="bi bi-image-fill uploader-icon"></span>
                    <p class="m-0 mt-2">Subir nueva Imagen</p>
                  </div>
                </label>
              </div>

              <div class="col-md-9">
                <div class="mb-4">
                  <label class="form-label-dash">TITULO DE LA NOTICIA</label>
                  <!-- SE AJUSTÓ AQUÍ: Se añadió name e id para el título -->
                  <input type="text" id="input-titulo" name="titulo" class="form-control form-input-dash" placeholder="Escribe el título de la noticia aquí...">
                </div>

                <div class="mb-4">
                  <label class="form-label-dash">Cuerpo de la noticia</label>
                  <!-- SE AJUSTÓ AQUÍ: Se añadió name e id para el cuerpo -->
                  <textarea id="input-cuerpo" name="cuerpo" class="form-control form-textarea-dash" rows="6" placeholder="Escribe el contenido detallado de la noticia..."></textarea>
                </div>
              </div>

              <div class="col-md-3 d-flex align-items-end justify-content-center pb-4">
                <button type="submit" class="btn-guardar-noticia">
                  <span class="btn-guardar-icon">
                    <i class="bi bi-download"></i>
                  </span>
                  <span class="btn-guardar-text">GUARDAR NOTICIA</span>
                </button>
              </div>

            </form>
          </div>

        </div>
      </main>
    </div>
  </div>

  <!-- SE AJUSTÓ AQUÍ: Enlazamos tu archivo de noticias asignado en la carpeta script.js -->
  <script src="script.js/noticias.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
